version: '3.9'

services:

  syllabusai.api:
    build:
      context: ./SyllabusAI.Service
      dockerfile: Dockerfile

    ports:
      - "5000:8080"

    depends_on:
      - sqlserver

    environment:
      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=SyllabusAIDb;User Id=sa;Password=YourStrong!Passw0rd;TrustServerCertificate=True"

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest

    environment:
      SA_PASSWORD: "YourStrong!Passw0rd"
      ACCEPT_EULA: "Y"

    ports:
      - "1433:1433"

    volumes:
      - sqlvolume:/var/opt/mssql

volumes:
  sqlvolume: