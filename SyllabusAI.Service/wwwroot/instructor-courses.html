  <script src="/js/out.js"></script>
  <script src="/js/user-fly.js"></script>
  <script>
    var token = localStorage.getItem('syllabus_token');
    var userStr = localStorage.getItem('syllabus_user');
    if (!token || !userStr) { window.location.href = '/'; }
    var user = JSON.parse(userStr);
    if (user.role !== 'Instructor') { window.location.href = user.role === 'Student' ? '/student.html' : '/'; }

    var BUBBLE_PALETTE = ['#e8dcc8', '#ffd6e0', '#fff4cc', '#ffdcc4', '#c8e7f5', '#e0d4f7', '#b8e0f0', '#d4edda', '#f0d9ff', '#ffeaa7'];
    var allCourses = [];

    function initials(n) {
      var p = (n || '').split(/\s+/);
      return p.length >= 2 ? (p[0][0] + p[1][0]).toUpperCase() : ((n || '?')[0]).toUpperCase();
    }
    document.getElementById('userAvatar').textContent = initials(user.fullName || user.email);
    document.getElementById('userName').textContent = user.fullName || user.email;

    function authHeader() { return { 'Authorization': 'Bearer ' + token }; }

    function bubbleColor(id) { return BUBBLE_PALETTE[(id * 5 + 1) % BUBBLE_PALETTE.length]; }

    function escapeHtml(s) {
      if (!s) return '';
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function filterCourses(list, q) {
      if (!q) return list;
      q = q.toLowerCase();
      return list.filter(function(c) {
        return ((c.courseCode || '') + ' ' + (c.title || '')).toLowerCase().indexOf(q) >= 0;
      });
    }

    function renderCourses(list) {
      var el = document.getElementById('courseList');
      if (!list || list.length === 0) {
        el.innerHTML = '<p class="empty">No courses yet. Use <a href="/instructor.html" style="color:#a5b4fc;">Add course</a> to create a course and syllabus.</p>';
        return;
      }
      var me = user.fullName || user.email || 'You';
      var meIni = initials(me);
      el.innerHTML = list.map(function(c) {
        var bg = bubbleColor(c.id);
        var hasS = !!c.hasSyllabus;
        return '<div class="bubble-card-wrap">' +
          '<div class="bubble-card-inner bc-s" style="--bubble-bg:' + bg + '">' +
          '<span class="bubble-code">' + escapeHtml(c.courseCode || '') + '</span>' +
          '<h3 class="bubble-title">' + escapeHtml(c.title || c.courseCode || 'Course') + '</h3>' +
          '<div class="bubble-instructor"><span class="bubble-avatar">' + escapeHtml(meIni) + '</span> ' + escapeHtml(me) + ' - instructor</div>' +
          '<div class="bubble-footer bubble-footer--instructor">' +
          '<span class="bubble-stat">' + (hasS ? 'Syllabus uploaded' : 'Syllabus missing') + '</span>' +
          '<span class="bubble-stat">Enrollment code: <strong>' + escapeHtml(c.courseCode || '') + '</strong></span>' +
          '<div class="bubble-actions">' +
          '<a class="btn-primary" href="/instructor.html?courseId=' + c.id + '">Upload / update syllabus</a>' +
          '<a class="btn-ghost" href="/instructor.html">All courses - create</a>' +
          '<button type="button" class="btn-ghost btn-delete-course" data-cid="' + c.id + '">Delete course</button>' +
          '</div></div></div></div>';
      }).join('');
    }

    function applyFilter() {
      var q = document.getElementById('searchCourses').value.trim();
      renderCourses(filterCourses(allCourses, q));
    }

    document.getElementById('courseList').addEventListener('click', function (ev) {
      var btn = ev.target.closest('.btn-delete-course');
      if (!btn) return;
      var courseId = parseInt(btn.getAttribute('data-cid'), 10);
      if (!courseId) return;
      if (!confirm('Delete this course and all related data?')) return;

      fetch('/api/courses/instructor/' + courseId, { method: 'DELETE', headers: authHeader() })
        .then(function (r) { return r.json().then(function (d) { return { ok: r.ok, data: d }; }); })
        .then(function (x) {
          if (!x.ok) {
            alert((x.data && x.data.message) || 'Could not delete course.');
            return;
          }
          allCourses = allCourses.filter(function (c) { return c.id !== courseId; });
          applyFilter();
        })
        .catch(function () { alert('Connection error.'); });
    });

    document.getElementById('searchCourses').addEventListener('input', applyFilter);

    function loadCourses() {
      fetch('/api/courses/instructor', { headers: authHeader() })
        .then(function(r) { return r.json(); })
        .then(function(list) {
          allCourses = list || [];
          applyFilter();
        })
        .catch(function() {
          document.getElementById('courseList').innerHTML = '<p class="empty">Could not load list.</p>';
        });
    }
    loadCourses();
  </script>
