<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SyllabusAI - Giriş</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Playfair+Display:wght@700;800&family=Kaushan+Script&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body { min-height: 100vh; display: flex; overflow: hidden; }

        /* SOL TARAF - MOR VE FOTOĞRAFLI PANEL */
        .left {
            flex: 1.2;
            /* Arka plan: Koyu mor gradient ve üzerine kampüs fotoğrafı bindirilmiş */
            background: linear-gradient(135deg, rgba(46, 11, 90, 0.9) 0%, rgba(109, 56, 173, 0.8) 100%), 
                        url('/images/kampus.jpg'); 
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 3rem;
            color: #fff;
            position: relative;
        }

        /* O YAMUK VE ESTETİK YAZI STİLİ */
        .left h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(4.2rem, 7vw, 6.5rem);
            font-weight: 800;
            line-height: 0.95;
            text-align: center;
            text-shadow: 0 6px 16px rgba(0,0,0,0.35);
            margin-bottom: 18px;
        }

        /* LOGO ALT KISIMDA */
        .bau-logo-box {
            width: 185px;
            height: auto;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .bau-logo-box img {
            max-width: 100%;
            height: auto;
            filter: drop-shadow(0 4px 10px rgba(0,0,0,0.3));
        }

        /* SAĞ TARAF - FORM ALANI */
        .right {
            flex: 1;
            background: #ffffff;
            padding: 4rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
        }

        .lang-switch {
            position: absolute;
            top: 2rem;
            right: 2rem;
        }

        .lang-switch button {
            background: #4a148c; /* Temaya uygun mor */
            color: white;
            border: none;
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 0.75rem;
            cursor: pointer;
            font-weight: 600;
        }

        .brand-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 2.5rem;
        }

        .robot-box {
            width: 55px;
            height: 55px;
            background: #f3f4f6;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .robot-box img { width: 85%; height: auto; }

        .brand-text h2 {
            color: #4a148c; /* Temaya uygun mor */
            font-weight: 800;
            font-size: 1.8rem;
            margin: 0;
            letter-spacing: 0.5px;
        }

        .brand-text p {
            color: #6b7280;
            font-size: 0.8rem;
            margin: 0;
        }

        /* FORM */
        .form-group { margin-bottom: 1.5rem; }
        
        .form-label-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        .form-label {
            font-size: 0.75rem;
            font-weight: 700;
            color: #4b5563;
            text-transform: uppercase;
        }

        .forgot-pass {
            font-size: 0.8rem;
            color: #4a148c;
            text-decoration: none;
            font-weight: 600;
        }

        .input-field {
            width: 100%;
            padding: 14px 14px 14px 45px; /* İkon için sol pedding */
            border: 1.5px solid #e5e7eb;
            border-radius: 12px;
            background: #f9fafb;
            font-size: 0.9rem;
        }

        .input-wrapper { position: relative; }
        .input-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
            color: #9ca3af;
        }

        .input-field:focus {
            outline: none;
            border-color: #7e57c2;
            background: #fff;
        }
        .input-field.pass { padding-right: 45px; }
        .eye-btn {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            width: 28px;
            height: 28px;
            border: none;
            border-radius: 8px;
            background: transparent;
            color: #6b7280;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .eye-btn:hover { background: rgba(74, 20, 140, 0.08); color: #4a148c; }

        .btn-submit {
            width: 100%;
            padding: 16px;
            background: #4a148c; /* Orijinal mor buton */
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(74, 20, 140, 0.3);
            margin-top: 10px;
            transition: background 0.3s;
        }

        .btn-submit:hover {
            background: #38006b;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            color: #4b5563;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="left">
        <h1>Hoş Geldin<br>BAU'lu</h1>
        
        <div class="bau-logo-box">
            <img src="/images/BauLogo.png" alt="BAU Logo">
        </div>
    </div>

    <div class="right">
      <div class="lang-switch">
        <button type="button" id="langBtn">TR / EN</button>
    </div>

        <div class="brand-header">
            <div class="robot-box">
                <img src="/images/robot.png" alt="AI">
            </div>
            <div class="brand-text">
                <h2>SYLLABUSAI</h2>
                <p>Akademik serüvenine kaldığın yerden devam et.</p>
            </div>
        </div>

        <div id="errorBox" style="display:none; background:#fef2f2; color:#dc2626; padding:12px 14px; border-radius:12px; font-size:0.9rem; font-weight:600; margin-bottom:18px;"></div>

        <form id="loginForm">
            <div class="form-group">
                <div class="form-label-row">
                    <label class="form-label">ÖĞRENCİ NO / E-POSTA</label>
                </div>
                <div class="input-wrapper">
                    <svg class="input-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                    <input id="email" type="text" class="input-field" placeholder="ogrenci@bahcesehir.edu.tr" required autocomplete="email">
                </div>
            </div>

            <div class="form-group">
                <div class="form-label-row">
                    <label class="form-label">ŞİFRE</label>
                    <a href="#" class="forgot-pass" id="forgotPass">Şifremi Unuttum</a>
                </div>
                <div class="input-wrapper">
                    <svg class="input-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                    <input id="password" type="password" class="input-field pass" placeholder="••••••••" required autocomplete="current-password">
                    <button type="button" class="eye-btn" id="togglePassword" aria-label="Şifreyi göster">
                      <svg id="eyeOpen" viewBox="0 0 24 24" fill="none" stroke="currentColor" width="18" height="18" stroke-width="2">
                        <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"></path>
                        <circle cx="12" cy="12" r="3"></circle>
                      </svg>
                      <svg id="eyeClosed" viewBox="0 0 24 24" fill="none" stroke="currentColor" width="18" height="18" stroke-width="2" style="display:none;">
                        <path d="M17.94 17.94A10.94 10.94 0 0112 19C5 19 1 12 1 12a21.8 21.8 0 015.06-6.94"></path>
                        <path d="M9.9 4.24A10.94 10.94 0 0112 5c7 0 11 7 11 7a21.8 21.8 0 01-3.22 4.37"></path>
                        <path d="M1 1l22 22"></path>
                      </svg>
                    </button>
                </div>
            </div>

            <label class="remember-me">
                <input type="checkbox" id="remember"> Beni Hatırla
            </label>

            <button type="submit" class="btn-submit">Giriş Yap</button>
        </form>
    </div>
    <script>
      document.getElementById('langBtn').addEventListener('click', function () {
          // Şu anki dili kontrol et (Cookie'den oku veya varsayılanı al)
          let currentLang = document.cookie.split('; ').find(row => row.startsWith('.AspNetCore.Culture='));
          let newLang = "en-US"; // Varsayılan yeni dil
  
          if (currentLang && currentLang.includes('en-US')) {
              newLang = "tr-TR";
          }
  
          // .NET Core'un beklediği formatta Cookie oluştur
          // Format: c=tr-TR|uic=tr-TR
          let cookieValue = `c=${newLang}|uic=${newLang}`;
          document.cookie = `.AspNetCore.Culture=${cookieValue}; path=/; max-age=31536000`; // 1 yıl geçerli
  
          // Sayfayı yenile ki dil değişimi etkili olsun
          window.location.reload()
      });

      // LOGIN: kurum e-postası + şifre → API doğrular, JWT döner (roller: Student / Instructor / Admin)
      const loginForm = document.getElementById('loginForm');
      const errorBox = document.getElementById('errorBox');
      const emailInput = document.getElementById('email');
      const passwordInput = document.getElementById('password');
      const rememberInput = document.getElementById('remember');

      // "Beni Hatırla": e-postayı yerelde sakla
      const rememberedEmail = localStorage.getItem('remembered_email');
      if (rememberedEmail) {
        emailInput.value = rememberedEmail;
        rememberInput.checked = true;
      }

      // "Şifremi Unuttum": destek maili aç
      document.getElementById('forgotPass').addEventListener('click', function (e) {
        e.preventDefault();
        const mail = encodeURIComponent((emailInput.value || '').trim());
        const subject = encodeURIComponent('SyllabusAI Şifre Sıfırlama Talebi');
        const body = encodeURIComponent('Merhaba,\nŞifre sıfırlama talebim var.\nE-posta: ' + (mail ? decodeURIComponent(mail) : ''));
        window.location.href = 'mailto:it@bahcesehir.edu.tr?subject=' + subject + '&body=' + body;
      });

      // Şifre göster/gizle
      document.getElementById('togglePassword').addEventListener('click', function () {
        const hidden = passwordInput.type === 'password';
        passwordInput.type = hidden ? 'text' : 'password';
        document.getElementById('eyeOpen').style.display = hidden ? 'none' : 'block';
        document.getElementById('eyeClosed').style.display = hidden ? 'block' : 'none';
      });

      loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        errorBox.style.display = 'none';

        const email = emailInput.value.trim();
        const password = passwordInput.value;

        try {
          const res = await fetch('/api/auth/login', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'X-Syllabus-Client': 'Web'
            },
            body: JSON.stringify({ email, password })
          });
          const data = await res.json().catch(() => ({}));
          if (!res.ok) {
            errorBox.textContent = data.message || 'Giriş başarısız.';
            errorBox.style.display = 'block';
            return;
          }

          if (rememberInput.checked) localStorage.setItem('remembered_email', email);
          else localStorage.removeItem('remembered_email');

          localStorage.setItem('syllabus_token', data.accessToken);
          localStorage.setItem('syllabus_user', JSON.stringify(data.user));
          const role = (data.user && (data.user.role ?? data.user.Role))
            ? String(data.user.role ?? data.user.Role)
            : '';
          if (role === 'Student') window.location.href = '/student.html';
          else if (role === 'Instructor') window.location.href = '/instructor.html';
          else {
            errorBox.textContent = 'Bilinmeyen rol: ' + role;
            errorBox.style.display = 'block';
          }
        } catch (err) {
          errorBox.textContent = 'Bağlantı hatası. Sunucu çalışıyor mu?';
          errorBox.style.display = 'block';
        }
      });
  </script>
</body>
</html>
