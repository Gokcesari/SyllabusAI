<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SyllabusAI - AI assistant</title>
  <link rel="stylesheet" href="/css/app.css?v=20260431">
  <style>
    .main-area.ai-wrap {
      width: 100%;
      max-width: none;
      margin: 0;
      padding-top: 0.85rem;
    }
    .ai-top {
      display: flex;
      gap: 0.85rem;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 1rem;
    }
    .robot-illus {
      width: 72px;
      height: 72px;
      flex-shrink: 0;
      background: linear-gradient(180deg, rgba(99,102,241,0.35) 0%, rgba(79,70,229,0.2) 100%);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .robot-illus svg { width: 40px; height: 40px; color: #a5b4fc; }
    .course-strip { flex: 1; min-width: 260px; }
    .course-strip label { display: block; font-size: 0.8rem; color: rgba(220, 214, 235, 0.9); margin-bottom: 0.35rem; }
    .course-strip select {
      width: 100%;
      padding: 0.58rem 0.72rem;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(20, 16, 36, 0.85);
      color: #f1f5f9;
      font-size: 0.9rem;
      color-scheme: dark;
    }

    .chat-panel {
      width: 100%;
      background: linear-gradient(160deg, #203a62 0%, #312e81 100%);
      border-radius: 14px;
      padding: 1.05rem 1.1rem;
      border: 1px solid rgba(196, 181, 253, 0.22);
      box-shadow: 0 12px 28px rgba(10, 8, 22, 0.22);
      color: #fff;
    }
    .chat-panel h2 { font-size: 1rem; margin-bottom: 0.45rem; color: #eef2ff; }
    .chat-input-wrap { display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; }
    .chat-input-wrap input {
      flex: 1;
      min-width: 360px;
      padding: 0.62rem 0.88rem;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 10px;
      font-size: 0.9rem;
      background: rgba(248, 250, 252, 0.97);
      color: #1e293b;
    }
    .chat-input-wrap input::placeholder {
      color: #6b7280;
      opacity: 1;
    }
    .chat-input-wrap button {
      padding: 0.62rem 1rem;
      border: none;
      border-radius: 10px;
      background: #4f46e5;
      color: #fff;
      font-weight: 700;
      cursor: pointer;
      min-width: 78px;
    }
    .chat-input-wrap button:disabled { opacity: 0.45; cursor: not-allowed; }

    .chat-messages {
      max-height: 520px;
      overflow-y: auto;
      margin-bottom: 0.7rem;
      font-size: 0.9rem;
      line-height: 1.45;
      padding-right: 0.15rem;
    }
    .chat-messages .bubble {
      margin-bottom: 0.5rem;
      padding: 0.55rem 0.72rem;
      border-radius: 10px;
      max-width: 95%;
      white-space: pre-wrap;
    }
    .chat-messages .user { background: rgba(255,255,255,0.22); margin-right: auto; }
    .chat-messages .bot { background: rgba(255,255,255,0.14); margin-left: auto; }
    .chat-messages .bot.scope-deny { background: rgba(245, 158, 11, 0.2); border: 1px solid rgba(245, 158, 11, 0.55); }
    .chat-messages .bot.ai-offline { background: rgba(239, 68, 68, 0.2); border: 1px solid rgba(239, 68, 68, 0.55); }
    .chat-messages .source-note { margin-top: 0.35rem; font-size: 0.76rem; color: #dbeafe; line-height: 1.35; }
    .lock-note { margin-top: 0.65rem; font-size: 0.83rem; color: #fde68a; display: none; }
    .lock-note.show { display: block; }

    /* Light mode: softer lilac with readable text */
    .tp.tl .robot-illus {
      background: linear-gradient(180deg, rgba(167, 139, 250, 0.24) 0%, rgba(129, 140, 248, 0.18) 100%);
      border-color: rgba(139, 92, 246, 0.25);
    }
    .tp.tl .course-strip label { color: #4b5563; }
    .tp.tl .course-strip select {
      background: rgba(248, 245, 255, 0.95);
      color: #1f2937;
      border-color: rgba(139, 92, 246, 0.28);
      color-scheme: light;
    }
    .tp.tl .chat-panel {
      background: linear-gradient(160deg, #eee9ff 0%, #e6dfff 100%);
      border-color: rgba(139, 92, 246, 0.3);
      color: #1f2937;
      box-shadow: 0 10px 24px rgba(124, 58, 237, 0.1);
    }
    .tp.tl .chat-panel h2 { color: #312e81; }
    .tp.tl .chat-input-wrap input {
      background: #ffffff;
      color: #1f2937;
      border-color: rgba(99, 102, 241, 0.32);
    }
    .tp.tl .chat-input-wrap button { background: #4f46e5; color: #fff; }
    .tp.tl .chat-messages .user {
      background: linear-gradient(135deg, #dbeafe 0%, #ddd6fe 100%);
      color: #1f2937;
    }
    .tp.tl .chat-messages .bot {
      background: linear-gradient(135deg, #f5f3ff 0%, #ede9fe 100%);
      color: #1f2937;
    }
    .tp.tl .chat-messages .source-note { color: #4338ca; }
    .tp.tl .lock-note { color: #92400e; }
  </style>
</head>
<body class="tp">

    <div class="user-box has-drop">
      <div class="user-drop">
        <button type="button" class="user-hit" id="userHit" aria-expanded="false" aria-haspopup="true" aria-label="Account menu">
          <div class="user-row">
            <div class="user-avatar" id="userAvatar">?</div>
            <div class="user-info"><div class="name" id="userName"></div><div class="meta" id="userMeta"></div></div>
          </div>

        <div class="user-fly" id="userFly" hidden role="menu">
          <button type="button" class="user-fly-out" role="menuitem" onclick="out()">Sign out</button>
        </div>
      </div>
    </div>
  </aside>
  <main class="main-area ai-wrap">
    <h1 class="page-title">AI assistant</h1>
    <div class="ai-top">
      <div class="robot-illus" aria-hidden="true">
        <svg class="icon-ai" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><g stroke="currentColor" stroke-width="1.35" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"><line x1="12" y1="5.5" x2="6.2" y2="11.5"/><line x1="12" y1="5.5" x2="17.8" y2="11.5"/><line x1="6.2" y1="11.5" x2="12" y2="18.5"/><line x1="17.8" y1="11.5" x2="12" y2="18.5"/><line x1="6.2" y1="11.5" x2="17.8" y2="11.5"/></g><circle cx="12" cy="5.5" r="2" fill="currentColor"/><circle cx="6.2" cy="11.5" r="1.65" fill="currentColor" opacity="0.88"/><circle cx="17.8" cy="11.5" r="1.65" fill="currentColor" opacity="0.88"/><circle cx="12" cy="18.5" r="2.1" fill="currentColor" opacity="0.95"/></svg>
      </div>
      <div class="course-strip">
        <label for="courseSelect">Course to ask about</label>
        <select id="courseSelect"></select>
      </div>
    </div>

    <div class="chat-panel">
      <h2>Chat</h2>
      <div class="chat-messages" id="chatMessages"></div>
      <div class="chat-input-wrap">
        <input type="text" id="questionInput" placeholder="Type your question..." autocomplete="off">
        <button type="button" id="btnAsk">Send</button>
      </div>
      <p class="lock-note" id="lockNote">AI is locked for this course. On the course page, scroll through the full syllabus and complete the reading unlock.</p>
    </div>
  </main>

  <a href="/student-ai.html" class="ai-assistant-fab" aria-label="AI assistant" title="AI assistant">
    <img src="/images/robot.png" alt="" width="38" height="38" decoding="async">
  </a>
  <script src="/js/out.js"></script>
  <script src="/js/user-fly.js"></script>
  <script>
    var token = localStorage.getItem('syllabus_token');
    var userStr = localStorage.getItem('syllabus_user');
    if (!token || !userStr) { window.location.href = '/'; }
    var user = JSON.parse(userStr);
    if (user.role !== 'Student') { window.location.href = '/student.html'; }
    var chatSessionByCourse = {};

    function initials(n){ var p=(n||'').split(/\s+/); return p.length>=2 ? (p[0][0]+p[1][0]).toUpperCase() : ((n||'?')[0]).toUpperCase(); }
    document.getElementById('userAvatar').textContent = initials(user.fullName || user.email);
    document.getElementById('userName').textContent = user.fullName || user.email;
    document.getElementById('userMeta').textContent = user.email || 'Student';

    function authHeader(){ return { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token }; }

    function syllabusReadComplete(courseId) {
      var p = parseFloat(localStorage.getItem('syllabus_read_progress_' + courseId) || '0');
      if (p >= 0.99) return true;
      var stage = parseInt(localStorage.getItem('syllabus_read_stage_' + courseId) || '1', 10);
      var unlocked = localStorage.getItem('syllabus_read_unlock_' + courseId) === '1';
      return stage >= 4 && unlocked;
    }

    fetch('/api/courses/my', { headers: authHeader() })
      .then(function(r){ return r.json(); })
      .then(function(list){
        var sel = document.getElementById('courseSelect');
        if (!list || list.length === 0) {
          sel.innerHTML = '<option value="">Add a course from My courses first</option>';
          updateAiLockForSelection();
          return;
        }
        sel.innerHTML = '<option value="">- Select a course -</option>' +
          list.map(function(c){ return '<option value="'+c.id+'">'+ (c.courseCode||'') + ' - ' + (c.title||''); }).join('');
        updateAiLockForSelection();
      });

    function addBubble(who, text, state) {
      var div = document.createElement('div');
      div.className = 'bubble ' + who;
      if (who === 'bot' && state) div.classList.add(state);
      div.textContent = text;
      document.getElementById('chatMessages').appendChild(div);
      div.scrollIntoView({ block: 'nearest' });
    }

    function addBotWithSources(answer, state, sections, snippets) {
      var div = document.createElement('div');
      div.className = 'bubble bot';
      if (state) div.classList.add(state);
      div.textContent = answer;

      var lines = [];
      if (sections && sections.length) lines.push('Sections: ' + sections.join(', '));
      if (snippets && snippets.length) lines.push('Sources: ' + snippets.slice(0, 2).join(' | '));

      if (lines.length > 0) {
        var note = document.createElement('div');
        note.className = 'source-note';
        note.textContent = lines.join('\n');
        div.appendChild(note);
      }

      document.getElementById('chatMessages').appendChild(div);
      div.scrollIntoView({ block: 'nearest' });
    }

    function updateAiLockForSelection() {
      var courseId = parseInt(document.getElementById('courseSelect').value, 10);
      var locked = !courseId || !syllabusReadComplete(courseId);
      document.getElementById('questionInput').disabled = locked;
      document.getElementById('btnAsk').disabled = locked;
      var note = document.getElementById('lockNote');
      if (locked) {
        note.classList.add('show');
        if (courseId) {
          note.textContent = 'AI is locked for this course. On the course page, scroll through the entire syllabus PDF to the bottom. When reading is complete, AI unlocks for this course.';
        } else {
          note.textContent = 'AI is locked until you select a course and complete the syllabus reading on the course page.';
        }
      } else note.classList.remove('show');
    }

    document.getElementById('btnAsk').onclick = function() {
      var q = document.getElementById('questionInput').value.trim();
      var courseId = parseInt(document.getElementById('courseSelect').value, 10);
      if (!q) return;
      if (!courseId) { addBubble('bot', 'Please select a course first.'); return; }
      if (!syllabusReadComplete(courseId)) {
        addBubble('bot', 'AI is locked. On the course page, scroll through the full syllabus to unlock AI for this course.');
        updateAiLockForSelection();
        return;
      }
      addBubble('user', q);
      document.getElementById('questionInput').value = '';
      var sid = chatSessionByCourse[courseId] || null;
      fetch('/api/chat/ask', { method: 'POST', headers: authHeader(), body: JSON.stringify({ courseId: courseId, sessionId: sid, question: q }) })
        .then(function(r){ return r.json(); })
        .then(function(d){
          if (d && d.sessionId) chatSessionByCourse[courseId] = d.sessionId;
          var answer = d.answer || 'No answer received.';
          var state = '';
          if (d && d.isOutOfScope) state = 'scope-deny';
          if (d && d.fromSyllabus === false && answer.toLowerCase().indexOf('ai service') >= 0) state = 'ai-offline';
          addBotWithSources(answer, state, d.sourceSections || [], d.sourceSnippets || []);
        })
        .catch(function(){ addBubble('bot', 'Connection error.'); });
    };
    document.getElementById('courseSelect').onchange = updateAiLockForSelection;
  </script>
</body>
</html>
