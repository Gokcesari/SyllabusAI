<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SyllabusAI - Eğitmen</title>
  <link rel="stylesheet" href="/css/app.css">
  <style>
    .form-block { margin-bottom: 1.5rem; max-width: 560px; }
    .form-block label { display: block; font-size: 0.8rem; font-weight: 600; color: #475569; margin-bottom: 0.35rem; }
    .form-block input, .form-block textarea {
      width: 100%; padding: 0.6rem 0.75rem; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 0.95rem; font-family: inherit;
    }
    .form-block textarea { min-height: 140px; resize: vertical; }
    .btn-create { padding: 0.6rem 1.25rem; border: none; border-radius: 8px; background: #4f46e5; color: #fff; font-weight: 600; cursor: pointer; }
    .instructor-list { list-style: none; }
    .instructor-list li { padding: 0.75rem 1rem; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; margin-bottom: 0.5rem; }
    .instructor-list .code { font-weight: 600; color: #1e3a5f; }
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="logo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2"/></svg> SYLLABUSAI</div>
    <div class="menu-label">EĞİTMEN MENÜSÜ</div>
    <nav>
      <a href="/instructor.html" class="active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Ders Ekle
      </a>
      <a href="/instructor-courses.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
        Derslerim
      </a>
      <a href="#"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg> Ayarlar</a>
    </nav>
    <div class="lang"><button type="button">TR / EN</button></div>
    <div class="user-box">
      <div class="user-avatar" id="userAvatar">?</div>
      <div class="user-info"><div class="name" id="userName"></div><div class="meta" id="userMeta">Eğitmen</div></div>
    </div>
  </aside>
  <main class="main-area">
    <h1 class="page-title">DERS EKLE</h1>
    <p class="page-meta">Ders kodu ve müfredat metnini girin. Öğrenciler bu kodu girerek dersi listelerine ekleyebilir ve AI ile soru sorabilir.</p>
    <div class="form-block">
      <label>Ders kodu</label>
      <input type="text" id="courseCode" placeholder="Örn: INE2001" maxlength="20">
    </div>
    <div class="form-block">
      <label>Ders adı</label>
      <input type="text" id="title" placeholder="Örn: İstatistik">
    </div>
    <div class="form-block">
      <label>Müfredat içeriği (syllabus metni)</label>
      <textarea id="syllabusContent" placeholder="Sınav tarihleri, devam kuralı, notlandırma, haftalık konular... Bu metin öğrencilere gösterilir ve AI bu metne göre cevap verir."></textarea>
    </div>
    <div class="form-block">
      <label>Öne çıkarılacak kelimeler (virgülle ayırın)</label>
      <input type="text" id="highlightKeywords" placeholder="sınav, devam, not">
    </div>
    <button type="button" id="btnCreate" class="btn-create">Ders oluştur</button>
    <div id="formMsg" class="msg" style="margin-top:1rem;"></div>

    <h2 class="page-title" id="list" style="margin-top:2.5rem;">DERSLERİM</h2>
    <ul class="instructor-list" id="courseList"></ul>
  </main>
  <script>
    var token = localStorage.getItem('syllabus_token');
    var userStr = localStorage.getItem('syllabus_user');
    if (!token || !userStr) { window.location.href = '/'; }
    var user = JSON.parse(userStr);
    if (user.role !== 'Instructor') { window.location.href = user.role === 'Student' ? '/student.html' : '/'; }
    function initials(n){ var p=(n||'').split(/\s+/); return p.length>=2 ? (p[0][0]+p[1][0]).toUpperCase() : ((n||'?')[0]).toUpperCase(); }
    document.getElementById('userAvatar').textContent = initials(user.fullName || user.email);
    document.getElementById('userName').textContent = user.fullName || user.email;

    function authHeader(){ return { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token }; }
    function showMsg(text, isErr){ var el=document.getElementById('formMsg'); el.textContent=text; el.className='msg '+(isErr?'err':'ok'); el.style.display='block'; }
    document.getElementById('btnCreate').onclick = function() {
      var code = document.getElementById('courseCode').value.trim();
      var title = document.getElementById('title').value.trim();
      var syllabus = document.getElementById('syllabusContent').value.trim();
      var keywords = document.getElementById('highlightKeywords').value.trim();
      if (!code) { showMsg('Ders kodu gerekli.', true); return; }
      fetch('/api/courses', { method: 'POST', headers: authHeader(), body: JSON.stringify({ courseCode: code, title: title || code, syllabusContent: syllabus, highlightKeywords: keywords || null }) })
        .then(function(r){ return r.json().then(function(d){ return { ok: r.ok, data: d }; }); })
        .then(function(r) {
          if (r.ok) { showMsg('Ders eklendi. Öğrenciler "' + code + '" kodu ile ekleyebilir.', false); document.getElementById('courseCode').value=''; document.getElementById('title').value=''; document.getElementById('syllabusContent').value=''; document.getElementById('highlightKeywords').value=''; loadCourses(); }
          else showMsg(r.data.message || 'Eklenemedi.', true);
        })
        .catch(function(){ showMsg('Bağlantı hatası.', true); });
    };
    function loadCourses() {
      fetch('/api/courses/instructor', { headers: authHeader() })
        .then(function(r){ return r.json(); })
        .then(function(list) {
          var el = document.getElementById('courseList');
          if (!list || list.length === 0) { el.innerHTML = '<li class="empty">Henüz ders eklemediniz.</li>'; return; }
          el.innerHTML = list.map(function(c){ return '<li><span class="code">'+c.courseCode+'</span> '+(c.title||'')+(c.hasSyllabus ? ' · Müfredat var' : ''); }).join('');
        });
    }
    loadCourses();
  </script>
</body>
</html>
