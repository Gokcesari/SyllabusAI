<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SyllabusAI - Derslerim</title>
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
  <aside class="sidebar">
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2"/></svg>
      SYLLABUSAI
    </div>
    <div class="menu-label">ÖĞRENCİ MENÜSÜ</div>
    <nav>
      <a href="/student.html" class="active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
        Derslerim
      </a>
      <a href="/student-add.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Syllabus Ekle
      </a>
      <a href="/student-ai.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2"/></svg>
        AI Asistan
      </a>
      <a href="#">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        Ayarlar
      </a>
    </nav>
    <div class="lang"><button type="button">TR / EN</button></div>
    <div class="user-box">
      <div class="user-avatar" id="userAvatar">EY</div>
      <div class="user-info">
        <div class="name" id="userName">Emre Yılmaz</div>
        <div class="meta" id="userMeta">Öğrenci</div>
      </div>
    </div>
  </aside>
  <main class="main-area">
    <h1 class="page-title">DERSLERİM</h1>
    <p class="page-meta" id="semesterMeta">BAHAR 2026 | 4. HAFTA</p>
    <div class="add-section">
      <div class="add-row">
        <input type="text" id="courseCode" placeholder="Ders kodu (örn. INE2001)" maxlength="20">
        <button type="button" id="btnAdd">Ekle</button>
      </div>
      <div id="addMsg" class="msg"></div>
    </div>
    <div class="course-grid" id="courseList"></div>
  </main>
  <script>
    var token = localStorage.getItem('syllabus_token');
    var userStr = localStorage.getItem('syllabus_user');
    if (!token || !userStr) { window.location.href = '/'; }
    var user = JSON.parse(userStr);
    if (user.role !== 'Student') { window.location.href = user.role === 'Instructor' ? '/instructor.html' : '/'; }
    function initials(name) { if (!name) return '?'; var p = name.split(/\s+/); if (p.length >= 2) return (p[0][0]+p[1][0]).toUpperCase(); return (name[0]||'?').toUpperCase(); }
    document.getElementById('userAvatar').textContent = initials(user.fullName || user.email);
    document.getElementById('userName').textContent = user.fullName || user.email;
    document.getElementById('userMeta').textContent = user.email || 'Öğrenci';

    function authHeader() { return { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token }; }
    function showAddMsg(text, isErr) { var el = document.getElementById('addMsg'); el.textContent = text; el.className = 'msg ' + (isErr ? 'err' : 'ok'); }
    document.getElementById('btnAdd').addEventListener('click', function() {
      var code = document.getElementById('courseCode').value.trim();
      if (!code) return;
      fetch('/api/courses/enroll', { method: 'POST', headers: authHeader(), body: JSON.stringify({ courseCode: code }) })
        .then(function(r) { return r.json().then(function(d) { return { ok: r.ok, data: d }; }); })
        .then(function(r) {
          if (r.ok) { showAddMsg(r.data.message || 'Ders eklendi.', false); document.getElementById('courseCode').value = ''; loadCourses(); }
          else showAddMsg(r.data.message || 'Ders bulunamadı.', true);
        })
        .catch(function() { showAddMsg('Bağlantı hatası.', true); });
    });
    function loadCourses() {
      fetch('/api/courses/my', { headers: authHeader() })
        .then(function(r) { return r.json(); })
        .then(function(list) {
          var el = document.getElementById('courseList');
          if (!list || list.length === 0) { el.innerHTML = '<p class="empty">Henüz ders eklemediniz. Ders kodu girip Ekle\'ye tıklayın veya <a href="/student-add.html">Syllabus Ekle</a> sayfasını kullanın.</p>'; return; }
          el.innerHTML = list.map(function(c) {
            return '<div class="course-card">' +
              '<span class="code">' + (c.courseCode || '') + '</span>' +
              '<div class="absence">0/4 Devamsızlık</div>' +
              '<div class="title">' + (c.title || c.courseCode) + '</div>' +
              '<div class="topic">Şu anki konu: —</div>' +
              '<div class="actions">' +
                '<a href="/student-course.html?id=' + c.id + '" class="btn-syllabus">Syllabus\'u İncele</a>' +
                '<a href="/student-course.html?id=' + c.id + '#chat" class="btn-ai" title="AI ile soru sor"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2"/></svg></a>' +
              '</div></div>';
          }).join('');
        })
        .catch(function() { document.getElementById('courseList').innerHTML = '<p class="empty">Liste yüklenemedi.</p>'; });
    }
    loadCourses();
  </script>
</body>
</html>
