<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SyllabusAI - My courses</title>
  <link rel="stylesheet" href="/css/app.css?v=20260341">
  <style>
    .feedback-gate {
      position: fixed; inset: 0; z-index: 1000;
      background: rgba(3, 5, 20, 0.78);
      display: none; align-items: center; justify-content: center;
      padding: 1.25rem;
    }
    .feedback-gate.show { display: flex; }
    .feedback-gate .panel {
      width: min(980px, 96vw);
      max-height: 90vh;
      overflow: auto;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.16);
      background: #f8fafc;
      color: #0f172a;
      padding: 1rem 1.1rem;
    }
    .feedback-gate .top { margin-bottom: 0.75rem; }
    .feedback-gate .title { font-size: 1.05rem; font-weight: 700; }
    .feedback-gate .meta { font-size: 0.84rem; color: #334155; margin-top: 0.25rem; }
    .q-card { background: #dbeafe; border-radius: 10px; padding: 0.7rem 0.8rem; margin-bottom: 0.65rem; }
    .q-text { font-size: 0.9rem; font-weight: 600; color: #1e293b; margin-bottom: 0.45rem; }
    .q-rates { display: flex; gap: 0.6rem; flex-wrap: wrap; }
    .q-rates label { font-size: 0.82rem; color: #0f172a; display: inline-flex; gap: 0.25rem; align-items: center; }
    .gate-actions { display: flex; gap: 0.6rem; align-items: center; margin-top: 0.65rem; }
    .gate-actions button {
      border: none; border-radius: 8px; background: #4f46e5; color: #fff;
      padding: 0.58rem 1rem; font-weight: 600; cursor: pointer;
    }
    .gate-msg { font-size: 0.82rem; color: #334155; }
  </style>
</head>
<body class="tp">
  <aside class="sidebar">
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2"/></svg>
      SYLLABUSAI
    </div>
    <div class="menu-label">STUDENT MENU</div>
    <nav>
      <a href="/student.html" class="active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
        My courses
      </a>
      <a href="/student-ai.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2"/></svg>
        AI assistant
      </a>
    </nav>
    <div class="user-box has-drop">
      <div class="user-drop">
        <button type="button" class="user-hit" id="userHit" aria-expanded="false" aria-haspopup="true" aria-label="Account menu">
          <div class="user-row">
            <div class="user-avatar" id="userAvatar">?</div>
            <div class="user-info">
              <div class="name" id="userName"></div>
              <div class="meta" id="userMeta">Student</div>
            </div>
          </div>
        </button>
        <div class="user-fly" id="userFly" hidden role="menu">
          <button type="button" class="user-fly-out" role="menuitem" onclick="out()">Sign out</button>
        </div>
      </div>
    </div>
  </aside>
  <main class="main-area main-area--lms">
    <h1 class="page-title">My courses</h1>
    <p class="page-meta meta-c" id="semesterMeta">Click a course to open the PDF or Word file uploaded by the instructor. Use AI assistant in the menu to ask questions.</p>

    <div class="lms-pills">
      <button type="button" class="lms-pill active" id="pillCourses">My courses</button>
      <button type="button" class="lms-pill" id="pillUpdates" title="Coming soon">Updates</button>
    </div>

    <div class="en-row" id="enrollRow">
      <label class="en-lbl" for="courseCode">Add course</label>
      <div class="en-in">
        <input type="text" id="courseCode" placeholder="Course code" maxlength="20" autocomplete="off" title="Code shared by your instructor">
        <button type="button" id="btnAdd">Add</button>
      </div>
    </div>

    <div id="addMsg" class="msg" style="display:none;"></div>

    <div class="bubble-grid" id="courseList"></div>

    <a href="/student-ai.html" class="ai-assistant-fab" aria-label="AI assistant" title="AI assistant">
      <img src="/images/robot.png" alt="" width="40" height="40" decoding="async">
    </a>
  </main>

  <div class="feedback-gate" id="feedbackGate" aria-hidden="true">
    <div class="panel">
      <div class="top">
        <div class="title">Course feedback survey (required)</div>
        <div class="meta" id="gateMeta">Rate all 15 questions from 1 to 5 before opening this course.</div>
      </div>
      <div id="gateQuestions"></div>
      <div class="gate-actions">
        <button type="button" id="btnGateSubmit">Submit survey</button>
        <span class="gate-msg" id="gateMsg"></span>
      </div>
    </div>
  </div>

  <script src="/js/out.js"></script>
  <script src="/js/user-fly.js"></script>
  <script>
    // My courses: session, list / enroll / remove / star — API /api/courses/*
    var token = localStorage.getItem('syllabus_token');
    var userStr = localStorage.getItem('syllabus_user');
    if (!token || !userStr) { window.location.href = '/'; }
    var user = JSON.parse(userStr);
    if (user.role !== 'Student') { window.location.href = user.role === 'Instructor' ? '/instructor.html' : '/'; }

    var BUBBLE_PALETTE = ['#f5e6d3', '#ffd6e0', '#fff4cc', '#ffdcc4', '#c8e7f5', '#e0d4f7', '#b8e0f0', '#d4edda', '#f0d9ff', '#ffeaa7'];
    var allCourses = [];
    var FEEDBACK_QUESTIONS = [
      'Course objectives and content were clearly communicated at the start of the term.',
      'Topics covered so far align with the syllabus.',
      'Digital platforms used were adequate for following the course and interaction.',
      'Course materials (notes, slides, etc.) were sufficient and useful.',
      'Additional resources and readings suggested in the course were easy to access.',
      'So far I understand the topics covered at a theoretical level.',
      'I think more in-class review or practice is needed to reinforce topics.',
      'During instruction, students with different learning speeds and levels were considered.',
      'Examples and activities in the course were well linked to real-world or professional scenarios.',
      'The pace of the course suits my ability to digest topics and take notes.',
      'The difficulty of topics matches my prior knowledge and skills.',
      'I feel encouraged to ask questions, join discussions, and share ideas in class.',
      'Assignments, projects, or quizzes meaningfully support my learning.',
      'The content and the instructor’s style keep my interest and motivation for the course.',
      'The instructor explains complex concepts using different methods to improve clarity.'
    ];
    var feedbackQuestionsFromDb = null;
    var activeGateCourse = null;

    function initials(name) {
      if (!name) return '?';
      var p = name.split(/\s+/);
      if (p.length >= 2) return (p[0][0] + p[1][0]).toUpperCase();
      return (name[0] || '?').toUpperCase();
    }
    document.getElementById('userAvatar').textContent = initials(user.fullName || user.email);
    document.getElementById('userName').textContent = user.fullName || user.email;
    document.getElementById('userMeta').textContent = user.email || 'Student';

    function authHeader() { return { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token }; }
    function authBearerOnly() { return { 'Authorization': 'Bearer ' + token }; }

    function bubbleColor(id) { return BUBBLE_PALETTE[(id * 7 + 3) % BUBBLE_PALETTE.length]; }

    function getStarred() {
      try { return JSON.parse(localStorage.getItem('syllabus_starred_courses') || '[]'); } catch (e) { return []; }
    }
    function setStarred(ids) { localStorage.setItem('syllabus_starred_courses', JSON.stringify(ids)); }
    function toggleStar(courseId, btn, ev) {
      ev.preventDefault();
      ev.stopPropagation();
      var s = getStarred();
      var k = String(courseId);
      var i = s.indexOf(k);
      if (i >= 0) { s.splice(i, 1); btn.classList.remove('on'); }
      else { s.push(k); btn.classList.add('on'); }
      setStarred(s);
      refreshCourseList();
    }

    function sortCoursesStarredFirst(list) {
      var starred = getStarred();
      return (list || []).slice().sort(function (a, b) {
        var sa = starred.indexOf(String(a.id)) >= 0 ? 1 : 0;
        var sb = starred.indexOf(String(b.id)) >= 0 ? 1 : 0;
        if (sb !== sa) return sb - sa;
        return (a.courseCode || '').localeCompare(b.courseCode || '', 'en');
      });
    }

    function showAddMsg(text, isErr) {
      var el = document.getElementById('addMsg');
      el.textContent = text;
      el.className = 'msg ' + (isErr ? 'err' : 'ok');
      el.style.display = 'block';
    }

    document.getElementById('btnAdd').addEventListener('click', function() {
      var code = document.getElementById('courseCode').value.trim().toUpperCase();
      if (!code) return;
      fetch('/api/courses/enroll', { method: 'POST', headers: authHeader(), body: JSON.stringify({ courseCode: code }) })
        .then(function(r) { return r.json().then(function(d) { return { ok: r.ok, status: r.status, data: d }; }); })
        .then(function(r) {
          if (r.ok) {
            showAddMsg(r.data.message || 'Course added.', false);
            document.getElementById('courseCode').value = '';
            loadCourses();
          } else if (r.status === 404) {
            showAddMsg('This course code was not found. The code may be wrong or the instructor may not have created the course yet.', true);
          } else {
            showAddMsg(r.data.message || 'Could not add.', true);
          }
        })
        .catch(function() { showAddMsg('Connection error.', true); });
    });

    function renderCourses(list) {
      list = sortCoursesStarredFirst(list);
      var el = document.getElementById('courseList');
      if (!list || list.length === 0) {
        el.innerHTML = '<p class="empty">No enrolled courses yet. Enter the code from your instructor in <strong>Add course</strong> above and click Add.</p>';
        return;
      }
      var starred = getStarred();
      el.innerHTML = list.map(function(c) {
        var bg = bubbleColor(c.id);
        var inst = c.instructorName || 'Instructor';
        var instIni = initials(inst);
        var hasS = !!c.hasSyllabus;
        var starOn = starred.indexOf(String(c.id)) >= 0 ? ' on' : '';
        return '<div class="bubble-card-shell" style="--bubble-bg:' + bg + '">' +
          '<button type="button" class="bubble-star' + starOn + '" aria-label="Favorite" data-cid="' + c.id + '">★</button>' +
          '<button type="button" class="bubble-remove" data-cid="' + c.id + '" title="Remove from list">Remove</button>' +
          '<a href="/student-course.html?id=' + c.id + '" class="bubble-card-main">' +
          '<div class="bubble-card-inner bc-s">' +
          '<span class="bubble-code">' + escapeHtml(c.courseCode || '') + '</span>' +
          '<h3 class="bubble-title">' + escapeHtml(c.title || c.courseCode || 'Course') + '</h3>' +
          '<div class="bubble-instructor"><span class="bubble-avatar">' + escapeHtml(instIni) + '</span> ' + escapeHtml(inst) + '</div>' +
          '<div class="bubble-footer">' +
          '<span class="bubble-stat">' + (hasS ? '✓ Syllabus ready' : '○ Syllabus pending') + '</span>' +
          '<span class="bubble-stat">Use «AI assistant» in the menu</span>' +
          '</div></div></a></div>';
      }).join('');

      el.querySelectorAll('.bubble-star').forEach(function(btn) {
        btn.addEventListener('click', function(ev) {
          toggleStar(parseInt(btn.getAttribute('data-cid'), 10), btn, ev);
        });
      });
      el.querySelectorAll('.bubble-remove').forEach(function(btn) {
        btn.addEventListener('click', function(ev) {
          ev.preventDefault();
          ev.stopPropagation();
          var cid = parseInt(btn.getAttribute('data-cid'), 10);
          if (!confirm('Remove this course from your list? (The course is not deleted from the system—only your enrollment here is removed.)')) return;
          fetch('/api/courses/my/' + cid, { method: 'DELETE', headers: authBearerOnly() })
            .then(function(r) { return r.json().then(function(d) { return { ok: r.ok, data: d }; }); })
            .then(function(r) {
              if (r.ok) {
                var s = getStarred().filter(function(x) { return x !== String(cid); });
                setStarred(s);
                allCourses = allCourses.filter(function(x) { return x.id !== cid; });
                refreshCourseList();
                showAddMsg(r.data.message || 'Removed.', false);
              } else showAddMsg(r.data.message || 'Could not remove.', true);
            })
            .catch(function() { showAddMsg('Connection error.', true); });
        });
      });
    }

    function escapeHtml(s) {
      if (!s) return '';
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function refreshCourseList() {
      renderCourses(allCourses);
    }

    document.getElementById('pillCourses').onclick = function() {
      document.getElementById('pillCourses').classList.add('active');
      document.getElementById('pillUpdates').classList.remove('active');
      document.getElementById('enrollRow').style.display = '';
      document.getElementById('courseList').style.display = '';
      refreshCourseList();
    };
    document.getElementById('pillUpdates').onclick = function() {
      document.getElementById('pillUpdates').classList.add('active');
      document.getElementById('pillCourses').classList.remove('active');
      document.getElementById('enrollRow').style.display = 'none';
      document.getElementById('courseList').innerHTML = '<p class="empty">Coming soon: announcements and reminders will appear here.</p>';
    };

    function loadCourses() {
      fetch('/api/courses/my', { headers: authHeader() })
        .then(function(r) { return r.json(); })
        .then(function(list) {
          allCourses = list || [];
          if (document.getElementById('pillCourses').classList.contains('active')) refreshCourseList();
        })
        .catch(function() {
          document.getElementById('courseList').innerHTML = '<p class="empty">Could not load list.</p>';
        });
    }

    function setGateVisible(v) {
      var gate = document.getElementById('feedbackGate');
      if (v) gate.classList.add('show');
      else gate.classList.remove('show');
      gate.setAttribute('aria-hidden', v ? 'false' : 'true');
    }

    function renderGateQuestions() {
      var questions = feedbackQuestionsFromDb && feedbackQuestionsFromDb.length
        ? feedbackQuestionsFromDb
        : FEEDBACK_QUESTIONS.map(function(q, i){ return { questionNo: i + 1, questionText: q }; });
      var host = document.getElementById('gateQuestions');
      host.innerHTML = questions.map(function(q) {
        var no = q.questionNo;
        var radios = [1,2,3,4,5].map(function(r) {
          return '<label><input type="radio" name="q' + no + '" value="' + r + '"> ' + r + '</label>';
        }).join('');
        return '<div class="q-card"><div class="q-text">' + no + '. ' + escapeHtml(q.questionText || '') + '</div><div class="q-rates">' + radios + '</div></div>';
      }).join('');
    }

    function collectGateAnswers() {
      var questions = feedbackQuestionsFromDb && feedbackQuestionsFromDb.length
        ? feedbackQuestionsFromDb
        : FEEDBACK_QUESTIONS.map(function(_, i){ return { questionNo: i + 1 }; });
      var answers = [];
      for (var i = 0; i < questions.length; i++) {
        var no = questions[i].questionNo;
        var sel = document.querySelector('input[name="q' + no + '"]:checked');
        if (!sel) return null;
        answers.push({ questionNo: no, rating: parseInt(sel.value, 10) });
      }
      return answers;
    }

    function findPendingFeedbackCourse() {
      var queue = allCourses.slice();
      function step(ix) {
        if (ix >= queue.length) return Promise.resolve(null);
        var c = queue[ix];
        return fetch('/api/courses/' + c.id + '/feedback-status', { headers: authHeader() })
          .then(function(r) { return r.ok ? r.json() : null; })
          .then(function(s) {
            if (s && s.windowOpen && !s.hasSubmitted) return c;
            return step(ix + 1);
          })
          .catch(function() { return step(ix + 1); });
      }
      return step(0);
    }

    function checkFeedbackGate() {
      fetch('/api/courses/feedback-questions', { headers: authHeader() })
        .then(function(r){ return r.ok ? r.json() : []; })
        .then(function(list){ feedbackQuestionsFromDb = Array.isArray(list) && list.length ? list : null; })
        .catch(function(){ feedbackQuestionsFromDb = null; })
        .finally(function() {
          findPendingFeedbackCourse().then(function(course) {
        if (!course) {
          activeGateCourse = null;
          setGateVisible(false);
          return;
        }
        activeGateCourse = course;
        document.getElementById('gateMeta').textContent = 'You must complete the survey for ' + (course.courseCode || '') + ' — ' + (course.title || 'Course') + ' before continuing.';
        renderGateQuestions();
        document.getElementById('gateMsg').textContent = '';
        setGateVisible(true);
          });
        });
    }

    document.getElementById('btnGateSubmit').addEventListener('click', function() {
      if (!activeGateCourse) return;
      var answers = collectGateAnswers();
      if (!answers) {
        document.getElementById('gateMsg').textContent = 'Please answer all questions with a rating from 1 to 5.';
        return;
      }
      var avg = Math.round(answers.reduce(function(sum, a){ return sum + a.rating; }, 0) / answers.length);
      fetch('/api/courses/' + activeGateCourse.id + '/feedback', {
        method: 'POST',
        headers: authHeader(),
        body: JSON.stringify({ rating: avg, comment: null, answers: answers })
      })
        .then(function(r) { return r.json().then(function(d){ return { ok: r.ok, d: d }; }); })
        .then(function(x) {
          if (!x.ok) {
            document.getElementById('gateMsg').textContent = x.d.message || 'Submission failed.';
            return;
          }
          document.getElementById('gateMsg').textContent = 'Thank you. Checking the next course survey...';
          checkFeedbackGate();
        })
        .catch(function() { document.getElementById('gateMsg').textContent = 'Connection error.'; });
    });

    loadCourses();
  </script>
</body>
</html>
