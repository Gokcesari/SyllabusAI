<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SyllabusAI - Müfredat</title>
  <link rel="stylesheet" href="/css/app.css">
  <style>
    .back { display: inline-block; margin-bottom: 1rem; color: #4f46e5; text-decoration: none; font-size: 0.875rem; }
    .syllabus-box { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; padding: 1.25rem; margin-bottom: 1.5rem; white-space: pre-wrap; line-height: 1.6; font-size: 0.9rem; color: #334155; }
    .syllabus-box .highlight { background: rgba(251, 191, 36, 0.4); padding: 0.1em 0.25em; border-radius: 3px; }
    .chat-box { background: linear-gradient(160deg, #1e3a5f 0%, #312e81 100%); border-radius: 12px; padding: 1.25rem; color: #fff; }
    .chat-box h3 { font-size: 0.95rem; margin-bottom: 0.75rem; }
    .chat-messages { max-height: 260px; overflow-y: auto; margin-bottom: 0.75rem; font-size: 0.875rem; }
    .chat-messages .bubble { margin-bottom: 0.5rem; padding: 0.5rem 0.75rem; border-radius: 8px; }
    .chat-messages .user { background: rgba(255,255,255,0.2); margin-right: auto; max-width: 85%; }
    .chat-messages .bot { background: rgba(255,255,255,0.15); margin-left: auto; max-width: 85%; }
    .chat-row { display: flex; gap: 0.5rem; }
    .chat-row input { flex: 1; padding: 0.6rem 0.75rem; border: none; border-radius: 8px; font-size: 0.9rem; }
    .chat-row button { padding: 0.6rem 1rem; border: none; border-radius: 8px; background: #4f46e5; color: #fff; font-weight: 500; cursor: pointer; }
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="logo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2"/></svg> SYLLABUSAI</div>
    <div class="menu-label">ÖĞRENCİ MENÜSÜ</div>
    <nav>
      <a href="/student.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg> Derslerim</a>
      <a href="/student-add.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Syllabus Ekle</a>
      <a href="/student-ai.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2"/></svg> AI Asistan</a>
      <a href="#"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg> Ayarlar</a>
    </nav>
    <div class="lang"><button type="button">TR / EN</button></div>
    <div class="user-box">
      <div class="user-avatar" id="userAvatar">?</div>
      <div class="user-info"><div class="name" id="userName"></div><div class="meta" id="userMeta"></div></div>
    </div>
  </aside>
  <main class="main-area">
    <a href="/student.html" class="back">← Derslerime dön</a>
    <h1 class="page-title" id="courseTitle">Müfredat</h1>
    <div class="syllabus-box" id="syllabusContent"></div>
    <div class="chat-box" id="chat">
      <h3>SORU – CEVAP AI · Müfredat ile ilgili soru sorun</h3>
      <div class="chat-messages" id="chatMessages"></div>
      <div class="chat-row">
        <input type="text" id="questionInput" placeholder="Syllabus'u incele ya da soru sor...">
        <button type="button" id="btnAsk">Gönder</button>
      </div>
    </div>
  </main>
  <script>
    var token = localStorage.getItem('syllabus_token');
    var userStr = localStorage.getItem('syllabus_user');
    if (!token || !userStr) { window.location.href = '/'; }
    var user = JSON.parse(userStr);
    if (user.role !== 'Student') { window.location.href = '/student.html'; }
    function initials(n){ var p=(n||'').split(/\s+/); return p.length>=2 ? (p[0][0]+p[1][0]).toUpperCase() : ((n||'?')[0]).toUpperCase(); }
    document.getElementById('userAvatar').textContent = initials(user.fullName || user.email);
    document.getElementById('userName').textContent = user.fullName || user.email;
    document.getElementById('userMeta').textContent = user.email || 'Öğrenci';

    var params = new URLSearchParams(window.location.search);
    var courseId = parseInt(params.get('id'), 10);
    if (!courseId) { window.location.href = '/student.html'; }
    function authHeader() { return { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token }; }

    fetch('/api/courses/' + courseId + '/syllabus', { headers: authHeader() })
      .then(function(r) { if (!r.ok) { window.location.href = '/student.html'; return; } return r.json(); })
      .then(function(d) {
        if (!d) return;
        document.getElementById('courseTitle').textContent = d.title || d.courseCode || 'Müfredat';
        var text = d.syllabusContent || 'Müfredat henüz eklenmemiş.';
        var keywords = d.highlightKeywords || [];
        keywords.forEach(function(k) {
          if (!k.trim()) return;
          var re = new RegExp('(' + k.trim().replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
          text = text.replace(re, '<span class="highlight">$1</span>');
        });
        document.getElementById('syllabusContent').innerHTML = text.replace(/\n/g, '<br>');
      })
      .catch(function() { window.location.href = '/student.html'; });

    function addMsg(who, text) {
      var div = document.createElement('div');
      div.className = 'bubble ' + who;
      div.textContent = text;
      document.getElementById('chatMessages').appendChild(div);
      div.scrollIntoView();
    }
    document.getElementById('btnAsk').onclick = function() {
      var q = document.getElementById('questionInput').value.trim();
      if (!q) return;
      addMsg('user', q);
      document.getElementById('questionInput').value = '';
      fetch('/api/chat/ask', { method: 'POST', headers: authHeader(), body: JSON.stringify({ courseId: courseId, question: q }) })
        .then(function(r) { return r.json(); })
        .then(function(d) { addMsg('bot', d.answer || 'Cevap alınamadı.'); })
        .catch(function() { addMsg('bot', 'Bağlantı hatası.'); });
    };
    if (window.location.hash === '#chat') document.getElementById('chat').scrollIntoView();
  </script>
</body>
</html>
